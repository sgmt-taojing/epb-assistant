<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>企业风险画像 · 环保执法</title>
<style>
:root{--bg:#0a0e1a;--card:#111827;--card2:#1a2332;--border:#1e293b;--primary:#3b82f6;--primary2:#60a5fa;--accent:#10b981;--warn:#f59e0b;--danger:#ef4444;--text:#e2e8f0;--muted:#64748b;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;padding-bottom:80px}
.hero{background:linear-gradient(135deg,#7c2d12 0%,#1e293b 100%);padding:24px 20px;text-align:center}
.hero h1{font-size:20px;font-weight:700;margin-bottom:4px}
.hero h1 span{color:var(--warn)}
.hero p{color:var(--muted);font-size:12px}
.container{padding:16px}
.search-bar{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.search-input{width:100%;padding:10px 14px;background:var(--card2);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:14px;outline:none}
.search-input:focus{border-color:var(--primary)}
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.section-title{font-size:14px;font-weight:600;color:var(--primary2);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';width:3px;height:14px;background:var(--primary);border-radius:2px}
/* 风险评分卡 */
.risk-score-card{background:linear-gradient(135deg,rgba(239,68,68,.1),rgba(245,158,11,.08));border:1px solid rgba(239,68,68,.2);border-radius:16px;padding:20px;text-align:center;margin-bottom:12px}
.risk-score{font-size:48px;font-weight:700;line-height:1}
.risk-level{font-size:16px;font-weight:600;margin-top:4px}
.risk-level.high{color:var(--danger)}
.risk-level.medium{color:var(--warn)}
.risk-level.low{color:var(--accent)}
.risk-desc{font-size:11px;color:var(--muted);margin-top:6px}
/* 维度评分 */
.dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dim-item{background:var(--card2);border-radius:10px;padding:12px}
.dim-item .dim-name{font-size:11px;color:var(--muted);margin-bottom:6px}
.dim-item .dim-score{font-size:20px;font-weight:700}
.dim-item .dim-bar{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.dim-item .dim-bar-fill{height:100%;border-radius:2px;transition:width .5s}
.dim-item.red .dim-score{color:var(--danger)}
.dim-item.red .dim-bar-fill{background:var(--danger)}
.dim-item.amber .dim-score{color:var(--warn)}
.dim-item.amber .dim-bar-fill{background:var(--warn)}
.dim-item.green .dim-score{color:var(--accent)}
.dim-item.green .dim-bar-fill{background:var(--accent)}
/* 风险事件列表 */
.event-list{list-style:none}
.event-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.event-item:last-child{border-bottom:none}
.event-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.event-dot.red{background:var(--danger)}
.event-dot.amber{background:var(--warn)}
.event-dot.green{background:var(--accent)}
.event-info{flex:1}
.event-title{font-size:13px;font-weight:500}
.event-meta{font-size:11px;color:var(--muted);margin-top:2px}
/* 建议 */
.advice-box{background:var(--card2);border-radius:10px;padding:14px;border-left:3px solid var(--primary)}
.advice-box .advice-title{font-size:13px;font-weight:600;color:var(--primary2);margin-bottom:8px}
.advice-box .advice-item{font-size:12px;color:var(--text);padding:4px 0;padding-left:16px;position:relative}
.advice-box .advice-item::before{content:'→';position:absolute;left:0;color:var(--primary)}
/* 企业卡片 */
.ent-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.ent-card:active{transform:scale(.98)}
.ent-card .ent-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ent-card .ent-name{font-size:14px;font-weight:600}
.ent-card .ent-risk{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.ent-card .ent-risk.high{background:rgba(239,68,68,.15);color:#fca5a5}
.ent-card .ent-risk.medium{background:rgba(245,158,11,.15);color:#fcd34d}
.ent-card .ent-risk.low{background:rgba(16,185,129,.15);color:#6ee7b7}
.ent-card .ent-info{font-size:11px;color:var(--muted)}
.ent-card .ent-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.ent-card .ent-tag{padding:2px 6px;background:var(--card2);border-radius:3px;font-size:10px;color:var(--muted)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;padding:8px 0;z-index:100}
.nav-item{flex:1;text-align:center;padding:6px 0;color:var(--muted);text-decoration:none;font-size:10px}
.nav-item.active{color:var(--primary)}
.nav-item .icon{font-size:18px;display:block;margin-bottom:2px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
</style>
</head>
<body>
<div class="hero">
<h1>企业风险 <span>画像</span></h1>
<p>多维度风险评估 · 精准执法靶向 · 风险趋势追踪</p>
</div>

<div class="search-bar">
<input class="search-input" id="search" placeholder="搜索企业名称或统一社会信用代码..." oninput="doSearch()">
</div>

<div id="ent-list" class="container"></div>
<div id="detail-area"></div>

<div class="bottom-nav">

</div>

<script>

];

var searchKeyword='';

function doSearch(){
searchKeyword=document.getElementById('search').value.toLowerCase().trim();
renderList();
}

function renderList(){
var list=ENTERPRISES;
if(searchKeyword){
list=ENTERPRISES.filter(function(e){
return e.name.toLowerCase().indexOf(searchKeyword)>=0||e.code.toLowerCase().indexOf(searchKeyword)>=0||e.industry.toLowerCase().indexOf(searchKeyword)>=0;
});
}
var container=document.getElementById('ent-list');
if(list.length===0){
container.innerHTML='<div class="empty">未找到匹配的企业</div>';
return;
}
container.innerHTML=list.map(function(e){
return '<div class="ent-card" onclick="showDetail(\''+e.id+'\')">'+
'<div class="ent-header"><span class="ent-name">'+e.name+'</span><span class="ent-risk '+e.risk_level+'">'+(e.risk_level==='high'?'高风险':e.risk_level==='medium'?'中风险':'低风险')+'</span></div>'+
'<div class="ent-info">'+e.industry+' · '+e.location+' · 风险分:'+e.risk_score+'</div>'+
'<div class="ent-tags">'+e.events.slice(0,2).map(function(ev){return '<span class="ent-tag">'+ev.title+'</span>'}).join('')+'</div>'+
'</div>';
}).join('');
}

function showDetail(eid){
var e=ENTERPRISES.filter(function(x){return x.id===eid})[0];
if(!e)return;
var riskColor=e.risk_level==='high'?'var(--danger)':e.risk_level==='medium'?'var(--warn)':'var(--accent)';
var riskText=e.risk_level==='high'?'高风险':e.risk_level==='medium'?'中风险':'低风险';
var dimNames={compliance:'合规评分',monitoring:'监测评分',history:'历史记录',rectification:'整改进度',emergency:'应急管理'};
var dimLabels={compliance:'合规',monitoring:'监测',history:'历史',rectification:'整改',emergency:'应急'};

var html='<div class="container">';

// 风险评分卡
html+='<div class="risk-score-card">'+
'<div class="risk-score" style="color:'+riskColor+'">'+e.risk_score+'</div>'+
'<div class="risk-level '+e.risk_level+'">'+riskText+'</div>'+
'<div class="risk-desc">'+e.name+' · '+e.industry+' · '+e.location+'</div>'+
'</div>';

// 维度评分
html+='<div class="section"><div class="section-title">风险维度评分</div><div class="dim-grid">';
Object.keys(e.dims).forEach(function(k){
var score=e.dims[k];
var cls=score>=80?'red':score>=60?'amber':'green';
html+='<div class="dim-item '+cls+'"><div class="dim-name">'+dimNames[k]+'</div><div class="dim-score">'+score+'</div><div class="dim-bar"><div class="dim-bar-fill" style="width:'+score+'%"></div></div></div>';
});
html+='</div></div>';

// 风险事件
html+='<div class="section"><div class="section-title">风险事件时间线</div><ul class="event-list">';
e.events.forEach(function(ev){
var dotCls=ev.type;
html+='<li class="event-item"><div class="event-dot '+dotCls+'"></div><div class="event-info"><div class="event-title">'+ev.title+'</div><div class="event-meta">'+ev.time+' · '+ev.desc+'</div></div></li>';
});
html+='</ul></div>';

// 执法建议
html+='<div class="section"><div class="section-title">执法建议</div><div class="advice-box"><div class="advice-title">基于风险画像的精准执法建议</div>';
e.advice.forEach(function(a){
html+='<div class="advice-item">'+a+'</div>';
});
html+='</div></div>';

// 基本信息
html+='<div class="section"><div class="section-title">企业基本信息</div>'+
'<div style="font-size:12px;color:var(--muted);line-height:2">'+
'<div>统一社会信用代码：'+e.code+'</div>'+
'<div>行业类型：'+e.industry+'</div>'+
'<div>所在地区：'+e.location+'</div>'+
'<div>排污许可证号：'+e.permit+'</div>'+
'</div></div>';

html+='</div>';
document.getElementById('ent-list').style.display='none';
document.getElementById('search-bar').style.display='none';
document.getElementById('detail-area').innerHTML=html+'<div class="container"><button class="btn btn-primary" style="width:100%;padding:14px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:15px;font-weight:600" onclick="backToList()">返回企业列表</button></div>';
}

function backToList(){
document.getElementById('ent-list').style.display='';
document.getElementById('search-bar').style.display='';
document.getElementById('detail-area').innerHTML='';
}

renderList();
</script>

</body>

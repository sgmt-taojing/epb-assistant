<style>
:root{--bg:#0a0e1a;--card:#111827;--card2:#1a2332;--border:#1e293b;--primary:#3b82f6;--primary2:#60a5fa;--accent:#10b981;--warn:#f59e0b;--danger:#ef4444;--text:#e2e8f0;--muted:#64748b;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;padding-bottom:80px}
.hero{background:linear-gradient(135deg:#1e3a5f 0%,#0c4a6e 100%);padding:24px 20px;text-align:center}
.hero h1{font-size:20px;font-weight:700;margin-bottom:4px}
.hero h1 span{color:var(--primary2)}
.hero p{color:var(--muted);font-size:12px}
.search-bar{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.search-row{display:flex;gap:8px}
.search-input{flex:1;padding:10px 14px;background:var(--card2);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:14px;outline:none}
.search-input:focus{border-color:var(--primary)}
.search-btn{padding:10px 16px;background:var(--primary);color:#fff;border:none;border-radius:20px;font-size:13px;cursor:pointer;font-weight:600}
.cat-bar{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;white-space:nowrap;background:var(--card)}
.cat-bar::-webkit-scrollbar{display:none}
.cat-chip{padding:6px 14px;border-radius:16px;background:var(--card2);border:1px solid var(--border);color:var(--muted);font-size:12px;cursor:pointer;flex-shrink:0}
.cat-chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
.container{padding:16px}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.stat-card .num{font-size:18px;font-weight:700;color:var(--primary2)}
.stat-card .label{font-size:10px;color:var(--muted);margin-top:2px}
.law-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.law-card:active{transform:scale(.98)}
.law-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.law-name{font-size:14px;font-weight:600;flex:1}
.law-level{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;flex-shrink:0;margin-left:8px}
.law-level.national{background:rgba(239,68,68,.15);color:#fca5a5}
.law-level.ministry{background:rgba(59,130,246,.15);color:#93c5fd}
.law-level.local{background:rgba(16,185,129,.15);color:#6ee7b7}
.law-meta{font-size:11px;color:var(--muted);margin-bottom:8px}
.law-desc{font-size:12px;line-height:1.6;color:var(--text)}
.law-tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.law-tag{padding:2px 6px;background:var(--card2);border-radius:3px;font-size:10px;color:var(--muted)}
.law-tag.hot{background:rgba(239,68,68,.1);color:#fca5a5}
.law-related{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--primary2)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;padding:8px 0;z-index:100}
.nav-item{flex:1;text-align:center;padding:6px 0;color:var(--muted);text-decoration:none;font-size:10px}
.nav-item.active{color:var(--primary)}
.nav-item .icon{font-size:18px;display:block;margin-bottom:2px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
</style>
</head>

var currentCat='all';
var searchKw='';

var CATS=[{key:'all',name:'全部'},{key:'综合',name:'综合'},{key:'水',name:'水污染'},{key:'大气',name:'大气'},{key:'固废',name:'固废危废'},{key:'执法',name:'执法程序'},{key:'监测',name:'监测'},{key:'应急',name:'应急'},{key:'信用',name:'信用'},{key:'许可',name:'排污许可'}];

function renderCats(){
var html=CATS.map(function(c){
return '<div class="cat-chip'+(c.key===currentCat?' active':'')+'" onclick="selectCat(\''+c.key+'\')">'+c.name+'</div>';
}).join('');
document.getElementById('cat-bar').innerHTML=html;
}

function selectCat(cat){
currentCat=cat;
renderCats();
renderList();
}

function doSearch(){
searchKw=document.getElementById('search').value.toLowerCase().trim();
renderList();
}

function renderList(){
var list=LAWS;
if(currentCat!=='all'){list=list.filter(function(l){return l.cat===currentCat})}
if(searchKw){
list=list.filter(function(l){
return l.name.toLowerCase().indexOf(searchKw)>=0||
l.desc.toLowerCase().indexOf(searchKw)>=0||
l.tags.some(function(t){return t.toLowerCase().indexOf(searchKw)>=0});
});
}
var html='';
if(list.length===0){
html='<div class="empty">未找到匹配的法规<br>试试其他关键词</div>';
}else{
list.forEach(function(l){
var tagsHtml=l.tags.map(function(t){return '<span class="law-tag'+(l.hot?' hot':'')+'">'+t+'</span>'}).join('');
html+='<div class="law-card" onclick="showDetail(\''+l.name.replace(/'/g,"\\'")+'\')">'+
'<div class="law-header"><span class="law-name">'+l.name+'</span><span class="law-level '+l.level+'">'+l.levelText+'</span></div>'+
'<div class="law-meta">颁布/修订：'+l.date+' · 分类：'+l.cat+'</div>'+
'<div class="law-desc">'+l.desc+'</div>'+
'<div class="law-tags">'+tagsHtml+'</div>'+
(l.related?'<div class="law-related">'+l.related+'</div>':'')+
'</div>';
});
}
document.getElementById('law-list').innerHTML=html;
}

function showDetail(name){
var l=LAWS.filter(function(x){return x.name===name})[0];
if(!l)return;
epbToast(l.name+' | '+l.date+' | '+l.levelText);
}

function epbToast(msg){var t=document.createElement('div');t.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a2332;color:#e2e8f0;padding:10px 20px;border-radius:8px;border:1px solid #1e293b;z-index:9999;font-size:12px;max-width:90%';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},3000)}

renderCats();
renderList();
</script>
<script src="voice-assistant.js"></script>

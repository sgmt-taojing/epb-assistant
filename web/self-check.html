<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>企业自查 — 环保智能体</title>
<style>
:root{--green:#2E7D5B;--green-mid:#3B9B6E;--green-light:#52B788;--green-pale:#D8E8DC;--bg:#F5F9F6;--card:#FFF;--border:#D8E8DE;--text:#1A1A1A;--muted:#777;--red:#C0392B;--amber:#E67E22;--radius:14px;--shadow:0 2px 12px rgba(46,125,91,.08)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,'PingFang SC',sans-serif;background:var(--bg);color:var(--text)}
.top-bar{background:linear-gradient(135deg,#2E7D5B,#3B9B6E);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:100}
.top-bar h1{font-size:17px;font-weight:600}.top-bar .sub{font-size:11px;opacity:.75}
.container{padding:12px;max-width:800px;margin:0 auto}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.card-title{font-size:15px;font-weight:700;color:var(--green);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.check-item{display:flex;align-items:flex-start;gap:8px;padding:10px;border-bottom:1px solid var(--border)}
.check-item:last-child{border-bottom:none}
.check-item input[type=checkbox]{margin-top:2px;flex-shrink:0;width:18px;height:18px}
.check-content{flex:1}.check-name{font-size:13px;font-weight:600}.check-desc{font-size:12px;color:var(--muted);margin-top:2px}
.check-status{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.status-pass{background:#D5F5E3;color:var(--green)}.status-fail{background:#FDEDEC;color:var(--red)}.status-na{background:#EBF5FB;color:var(--blue)}
.industry-select{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:12px}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}.btn-primary{background:var(--green);color:#fff}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.result-box{text-align:center;padding:14px;border-radius:10px}.result-box.pass{background:#D5F5E3}.result-box.fail{background:#FDEDEC}.result-box.total{background:var(--green-pale)}
.result-box .num{font-size:28px;font-weight:700}.result-box .label{font-size:11px;color:var(--muted);margin-top:2px}
textarea{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;min-height:60px;resize:vertical;font-family:inherit}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(27,67,50,.92);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:9999;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.back-link{display:block;text-align:center;padding:16px;color:var(--green);font-size:13px;text-decoration:none}
</style>
<script src="/auth-guard.js"></script>

<script>
// API 降级：当后端不可用时自动使用静态 JSON 数据
var _apiFallbackMap = {
  '/api/health': '/api-data/health.json',
  '/api/tasks': '/api-data/tasks.json',
  '/api/cases': '/api-data/cases.json',
  '/api/cases?limit=200': '/api-data/cases.json',
  '/api/cases?limit=5': '/api-data/cases.json',
  '/api/cases?limit=50': '/api-data/cases.json',
  '/api/law_index': '/api-data/law_index.json',
  '/api/law_mapping': '/api-data/law_mapping.json',
  '/api/knowledge_graph': '/api-data/knowledge_graph.json',
  '/api/enterprises': '/api-data/enterprises.json',
  '/api/devices': '/api-data/devices.json',
  '/api/device_types': '/api-data/device_types.json',
  '/api/roles': '/api-data/roles.json',
  '/api/users': '/api-data/users.json',
  '/api/tenant': '/api-data/tenant.json',
  '/api/config': '/api-data/config.json',
  '/api/report': '/api-data/health.json',
  '/api/search?type=all&limit=5': '/api-data/cases.json'
};
var _origFetch = window.fetch;
window.fetch = function(url, opts) {
  return _origFetch(url, opts).catch(function() {
    var fb = _apiFallbackMap[url] || _apiFallbackMap[url.split('?')[0]];
    if (fb) {
      console.log('[fallback] ' + url + ' -> ' + fb);
      return _origFetch(fb);
    }
    throw new Error('API unavailable: ' + url);
  });
};
</script>
<script src="api-fallback.js"></script>
</head>
<body>

  <div class="sub">环保智能体 · 企业合规自检平台</div>
</div>
<div class="container">
  <div class="card">
    <div class="card-title">📋 自查配置</div>
    <select class="industry-select" id="industry" onchange="loadChecklist()">
      <option value="">请选择行业</option>
      <option value="manufacturing">制造业</option>
      <option value="chemical">化工行业</option>
      <option value="mining">采矿行业</option>
      <option value="food">食品加工</option>

      <option value="construction">建筑施工</option>
      <option value="catering">餐饮服务</option>
    </select>
  </div>
  <div class="card" id="checklistCard" style="display:none">
    <div class="card-title">✅ 自查清单</div>
    <div id="checklist"></div>
  </div>
  <div class="card" id="resultCard" style="display:none">
    <div class="card-title">📊 自查结果</div>
    <div class="result-grid">
      <div class="result-box pass"><div class="num" id="passCount">0</div><div class="label">合格项</div></div>
      <div class="result-box fail"><div class="num" id="failCount">0</div><div class="label">不合格项</div></div>
      <div class="result-box total"><div class="num" id="totalCount">0</div><div class="label">总检查项</div></div>
    </div>
    <div style="margin-top:12px">
      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">整改计划</label>
      <textarea id="rectificationPlan" placeholder="针对不合格项，请填写整改计划和完成时限..."></textarea>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="submitSelfCheck()">提交自查报告</button>
  </div>
  <a href="index.html" class="back-link">← 返回首页</a>
</div>
<div class="toast" id="toast"></div>

var currentChecks=[];
function loadChecklist(){
  var ind=document.getElementById('industry').value;
  if(!ind){document.getElementById('checklistCard').style.display='none';return;}
  currentChecks=CHECKLISTS[ind]||[];
  var html=currentChecks.map(function(c,i){
    return '<div class="check-item"><input type="checkbox" id="chk-'+i+'" onchange="updateResult()">'+
      '<div class="check-content"><div class="check-name">'+(i+1)+'. '+c.name+'</div>'+
      '<div class="check-desc">'+c.desc+'</div></div></div>';
  }).join('');
  document.getElementById('checklist').innerHTML=html;
  document.getElementById('checklistCard').style.display='block';
  document.getElementById('resultCard').style.display='block';
  updateResult();
}
function updateResult(){
  var pass=0,fail=0;
  currentChecks.forEach(function(c,i){
    var cb=document.getElementById('chk-'+i);
    if(cb&&cb.checked)pass++;else fail++;
  });
  document.getElementById('passCount').textContent=pass;
  document.getElementById('failCount').textContent=fail;
  document.getElementById('totalCount').textContent=currentChecks.length;
}
function submitSelfCheck(){
  var ind=document.getElementById('industry').value;
  var pass=0,fail=0;
  currentChecks.forEach(function(c,i){if(document.getElementById('chk-'+i).checked)pass++;else fail++;});
  var plan=document.getElementById('rectificationPlan').value;
  if(fail>0&&!plan){showToast('请填写整改计划');return;}
  var report={industry:ind,pass:pass,fail:fail,total:currentChecks.length,plan:plan,date:new Date().toISOString()};
  fetch('/api/task',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'self_check',title:'企业自查报告 — '+ind,source:'企业自查',content:JSON.stringify(report),priority:fail>3?'high':'medium'})}).then(function(r){return r.json();}).then(function(){
    showToast('自查报告已提交');setTimeout(function(){location.href='index.html';},1500);
  }).catch(function(){showToast('提交失败，请检查服务');});
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

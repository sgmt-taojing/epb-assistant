<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>设备商城 · 环保监管传感器全量名录</title>
<style>
:root{--bg:#0a0e1a;--card:#111827;--card2:#1a2332;--border:#1e293b;--primary:#3b82f6;--primary2:#60a5fa;--accent:#10b981;--warn:#f59e0b;--danger:#ef4444;--text:#e2e8f0;--muted:#64748b;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;padding-bottom:80px}
.hero{background:linear-gradient(135deg,#0c4a6e 0%,#1e293b 100%);padding:32px 20px;text-align:center}
.hero h1{font-size:24px;font-weight:700;margin-bottom:6px}
.hero h1 span{color:var(--primary2)}
.hero p{color:var(--muted);font-size:13px;margin-bottom:8px}
.hero .stats{display:flex;justify-content:center;gap:24px;margin-top:12px}
.hero .stat{text-align:center}
.hero .stat .num{font-size:22px;font-weight:700;color:var(--primary2)}
.hero .stat .label{font-size:11px;color:var(--muted)}
.container{max-width:1280px;margin:0 auto;padding:16px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;background:var(--card);padding:12px;border-radius:12px;margin-bottom:14px;border:1px solid var(--border);align-items:center}
.search{flex:1;min-width:200px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none}
.search:focus{border-color:var(--primary)}
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap}
.cat-tab{padding:6px 12px;background:var(--bg);border:1px solid var(--border);border-radius:16px;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s}
.cat-tab:hover{border-color:var(--primary);color:var(--primary2)}
.cat-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.cat-tab .count{opacity:.7;margin-left:3px}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;transition:all .2s;position:relative;display:flex;flex-direction:column}
.product-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,.15)}
.cat-badge{position:absolute;top:12px;right:12px;padding:2px 8px;background:rgba(59,130,246,.15);color:#93c5fd;border-radius:4px;font-size:10px;font-weight:600}
.hot-badge{position:absolute;top:12px;left:12px;padding:2px 8px;background:rgba(245,158,11,.2);color:#fbbf24;border-radius:4px;font-size:10px;font-weight:600}
.product-head{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.product-icon{width:40px;height:40px;background:var(--card2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.product-meta{flex:1;min-width:0}
.product-id{font-size:10px;color:var(--muted);font-family:'Courier New',monospace}
.product-brand{font-size:11px;color:var(--primary2)}
.product-title{font-size:15px;font-weight:600;color:#fff;margin-bottom:4px;line-height:1.3}
.product-model{font-size:11px;color:var(--muted);margin-bottom:8px}
.product-spec{font-size:12px;color:var(--text);background:var(--card2);padding:8px 10px;border-radius:6px;margin-bottom:8px;line-height:1.5}
.product-section{margin-top:8px}
.product-section .sec-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600}
.product-section .sec-content{font-size:12px;color:var(--text);line-height:1.5}
.features{display:flex;flex-wrap:wrap;gap:4px}
.feature-tag{padding:2px 6px;background:var(--card2);border:1px solid var(--border);border-radius:3px;font-size:10px;color:#94a3b8}
.product-foot{margin-top:auto;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.product-price{font-size:16px;font-weight:700;color:var(--accent)}
.product-unit{font-size:11px;color:var(--muted);margin-left:2px}
.btn-cta{padding:6px 14px;background:var(--primary);color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;transition:all .2s}
.btn-cta:hover{background:#2563eb}
.scenarios{display:flex;flex-wrap:wrap;gap:4px}
.scenario-tag{padding:2px 6px;background:rgba(16,185,129,.1);color:#6ee7b7;border-radius:3px;font-size:10px}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .icon{font-size:48px;opacity:.3;margin-bottom:10px}
</style>
<script src="api-fallback.js"></script>
</head>
<body>
<div class="hero">
<h1>环保监管传感器<span>·设备商城</span></h1>
<p>10大类 · 56件专业仪器 · 覆盖水/气/声/土/固/废/辐射/生态/执法全场景</p>
<div class="stats">
<div class="stat"><div class="num" id="stat-total">0</div><div class="label">产品总数</div></div>
<div class="stat"><div class="num" id="stat-cat">0</div><div class="label">分类数</div></div>
<div class="stat"><div class="num" id="stat-brand">0</div><div class="label">品牌数</div></div>
<div class="stat"><div class="num" id="stat-hot">0</div><div class="label">热门款</div></div>
</div>
</div>

<div class="container">
<div class="toolbar">
<input type="text" class="search" id="searchBox" placeholder="搜索产品名/型号/品牌/应用场景...">
<div class="cat-tabs" id="catTabs"></div>
</div>

<div class="products" id="productsGrid"></div>
</div>

<script>
const DATA = {
  cats: [
    {id:'all',name:'全部',icon:'🌐'},
    {id:'water',name:'水质监测',icon:'💧'},
    {id:'air',name:'大气监测',icon:'🌫️'},
    {id:'noise',name:'噪声监测',icon:'🔊'},
    {id:'soil',name:'土壤监测',icon:'🌱'},
    {id:'waste',name:'固废危废',icon:'☣️'},
    {id:'voc',name:'VOCs监测',icon:'💨'},
    {id:'radiation',name:'辐射监测',icon:'☢️'},
    {id:'ecological',name:'生态监测',icon:'🦅'},
    {id:'portable',name:'便携执法',icon:'📱'},
    {id:'platform',name:'监测平台',icon:'🖥️'}
  ]
};

let PRODUCTS = [];
let currentCat = 'all';

(async function(){
  try {
    const res = await fetch('equipment-catalog.json', {cache:'no-store'});
    const data = await res.json();
    PRODUCTS = data.products;
    const brandSet = new Set(PRODUCTS.map(p => p.brand));
    const hotCount = PRODUCTS.filter(p => p.hot).length;
    document.getElementById('stat-total').textContent = PRODUCTS.length;
    document.getElementById('stat-cat').textContent = data.categories.length;
    document.getElementById('stat-brand').textContent = brandSet.size;
    document.getElementById('stat-hot').textContent = hotCount;
  } catch(e) {
    PRODUCTS = FALLBACK;
    document.getElementById('stat-total').textContent = PRODUCTS.length;
  }
  renderTabs();
  renderProducts();
  document.getElementById('searchBox').addEventListener('input', renderProducts);
})();

function renderTabs(){
  const el = document.getElementById('catTabs');
  const counts = {};
  PRODUCTS.forEach(p => counts[p.cat] = (counts[p.cat] || 0) + 1);
  el.innerHTML = DATA.cats.map(c => {
    const n = c.id === 'all' ? PRODUCTS.length : (counts[c.id] || 0);
    return `<div class="cat-tab ${c.id===currentCat?'active':''}" data-id="${c.id}">${c.icon} ${c.name}<span class="count">${n}</span></div>`;
  }).join('');
  el.querySelectorAll('.cat-tab').forEach(t => t.addEventListener('click', () => {
    currentCat = t.dataset.id;
    renderTabs();
    renderProducts();
  }));
}

function renderProducts(){
  const q = (document.getElementById('searchBox').value || '').toLowerCase().trim();
  const list = PRODUCTS.filter(p => {
    if (currentCat !== 'all' && p.cat !== currentCat) return false;
    if (!q) return true;
    const hay = [p.name, p.model, p.brand, p.spec, p.applications, ...(p.scenarios||[]), ...(p.features||[])].join(' ').toLowerCase();
    return hay.includes(q);
  });
  const grid = document.getElementById('productsGrid');
  if (list.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><div>没有找到匹配的产品</div></div>';
    return;
  }
  grid.innerHTML = list.map(p => {
    const catName = (DATA.cats.find(c => c.id === p.cat)||{}).name || p.cat;
    const icon = (DATA.cats.find(c => c.id === p.cat)||{}).icon || '📦';
    return `
<article class="product-card">
  ${p.hot ? '<span class="hot-badge">🔥 热门</span>' : ''}
  <span class="cat-badge">${catName}</span>
  <div class="product-head">
    <div class="product-icon">${icon}</div>
    <div class="product-meta">
      <div class="product-id">${p.id}</div>
      <div class="product-brand">${p.brand}</div>
    </div>
  </div>
  <div class="product-title">${p.name}</div>
  <div class="product-model">型号: ${p.model}</div>
  <div class="product-spec">📊 ${p.spec}</div>
  <div class="product-section">
    <div class="sec-title">🎯 应用场景</div>
    <div class="scenarios">${(p.scenarios||[]).map(s => `<span class="scenario-tag">${s}</span>`).join('')}</div>
  </div>
  <div class="product-section">
    <div class="sec-title">⚙️ 核心特性</div>
    <div class="features">${(p.features||[]).map(f => `<span class="feature-tag">${f}</span>`).join('')}</div>
  </div>
  <div class="product-section">
    <div class="sec-title">💡 监管说明</div>
    <div class="sec-content">${p.applications}</div>
  </div>
  <div class="product-foot">
    <div><span class="product-price">${p.price}</span><span class="product-unit">/${p.unit}</span></div>
    <button class="btn-cta" onclick="inquire('${p.id}','${p.name.replace(/'/g, '\\&#39;')}')">询价</button>
  </div>
</article>`;
  }).join('');
}

function inquire(id, name){
  const text = `已记录询价：${name}（${id}）。客服将在24小时内联系您。`;
  if (typeof epbToast === 'function') epbToast(text, 'success');
  else if (window.AIAssistant) window.AIAssistant.open();
  else if (typeof epbToast === "function") epbToast(text, "info"); else console.log(text);
}

// 静态fallback（fetch失败时）
const FALLBACK = [
  {id:'W-001',cat:'water',name:'COD在线监测仪',brand:'聚光科技',model:'COD-2000',spec:'量程0-5000mg/L',price:'¥58,000',unit:'台',scenarios:['化工'],features:['HJ 377'],applications:'COD监测',hot:true},
  {id:'A-001',cat:'air',name:'PM2.5监测仪',brand:'赛默飞',model:'TEOM 1405',spec:'量程0-10mg/m³',price:'¥128,000',unit:'台',scenarios:['国控站'],features:['β射线法'],applications:'颗粒物监测',hot:true}
];
</script>
<script src="global-sidebar.js"></script>
<script src="voice-assistant.js"></script>
<script src="ai-assistant.js"></script>
</body>
</html>

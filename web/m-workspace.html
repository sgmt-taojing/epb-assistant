<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>📋 工作台 — 环保智慧执法平台</title>
<style>
:root{--g:#1B4332;--gm:#2D6A4F;--gl:#52B788;--gp:#D8E8DC;--gbg:#F2F8F4;--red:#E74C3C;--amber:#E67E22;--blue:#2980B9;--purple:#8E44AD;--bg:#F0F2F0;--card:#FFF;--border:#D0E0D4;--text:#1A1A1A;--muted:#666;--shadow:0 2px 8px rgba(27,67,50,.06);--r:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.top-bar{background:linear-gradient(135deg,#1B4332,#2D6A4F);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.back-btn{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;font-size:18px;flex-shrink:0}
.top-bar h1{font-size:16px;font-weight:600;flex:1}
.role-badge{font-size:11px;padding:3px 10px;background:rgba(255,255,255,.15);border-radius:12px}
.user-info{display:flex;align-items:center;gap:10px;padding:16px;background:var(--card);border-bottom:1px solid var(--border)}
.user-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--gm),var(--g));display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;flex-shrink:0}
.user-detail{flex:1;min-width:0}
.user-name{font-size:15px;font-weight:700;color:var(--g)}
.user-org{font-size:12px;color:var(--muted)}
.user-checklist-btn{padding:6px 12px;background:var(--gbg);border-radius:8px;font-size:11px;color:var(--gm);font-weight:600;text-decoration:none;white-space:nowrap}
.section{margin:12px;background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.section-title{font-size:14px;font-weight:700;color:var(--g);display:flex;align-items:center;gap:6px}
.section-title .dot{width:4px;height:16px;background:var(--gm);border-radius:2px}
.section-more{font-size:12px;color:var(--muted)}
.module-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
.module-item{background:var(--card);padding:14px 8px 10px;text-align:center;text-decoration:none;color:var(--text);display:flex;flex-direction:column;align-items:center;gap:4px}
.module-item:active{background:var(--gbg)}
.module-icon{font-size:24px}
.module-name{font-size:11px;font-weight:500}
.task-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.task-item:last-child{border:none}
.task-item:active{background:var(--gbg)}
.task-priority{width:4px;height:28px;border-radius:2px;flex-shrink:0}
.p-high{background:var(--red)}
.p-mid{background:var(--amber)}
.p-low{background:var(--gl)}
.task-info{flex:1;min-width:0}
.task-title{font-size:13px;font-weight:600;line-height:1.4}
.task-meta{font-size:11px;color:var(--muted);margin-top:2px}
.task-arrow{color:var(--muted);font-size:14px;flex-shrink:0}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);padding:12px 16px;gap:8px}
.stat-item{text-align:center}
.stat-val{font-size:20px;font-weight:700;color:var(--g)}
.stat-label{font-size:10px;color:var(--muted);margin-top:2px}
.checklist-item{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px;font-size:12px}
.checklist-item:last-child{border:none}
.checklist-num{width:20px;height:20px;border-radius:50%;background:var(--gm);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.alert-item{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px;font-size:12px}
.alert-item:last-child{border:none}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.alert-red{background:var(--red);box-shadow:0 0 4px var(--red)}
.alert-amber{background:var(--amber);box-shadow:0 0 4px var(--amber)}
.alert-green{background:var(--gl)}
.empty{text-align:center;padding:20px;color:var(--muted);font-size:12px}
.footer{text-align:center;padding:20px 16px 32px;color:var(--muted);font-size:11px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(27,67,50,.92);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:9999;display:none}
#toast.show{display:block}
</style>
<script src="/auth-guard.js"></script>
</head>
<body>
<div class="top-bar">
  <a href="/wechat-h5.html" class="back-btn">‹</a>
  <h1>📋 我的工作台</h1>
  <div class="role-badge" id="role-badge">未登录</div>
</div>

<div class="user-info">
  <div class="user-avatar" id="user-avatar">🌿</div>
  <div class="user-detail">
    <div class="user-name" id="user-name">游客</div>
    <div class="user-org" id="user-org">请登录获取个性化服务</div>
  </div>
  <a href="/login.html" class="user-checklist-btn">登录/切换</a>
</div>

<!-- 角色统计 -->
<div class="section">
  <div class="section-header">
    <div class="section-title"><span class="dot"></span>工作统计</div>
  </div>
  <div class="stat-row">
    <div class="stat-item"><div class="stat-val" id="stat-todo">--</div><div class="stat-label">待办</div></div>
    <div class="stat-item"><div class="stat-val" id="stat-done">--</div><div class="stat-label">已完成</div></div>
    <div class="stat-item"><div class="stat-val" id="stat-alert">--</div><div class="stat-label">预警</div></div>
  </div>
</div>

<!-- 角色模块入口 -->
<div class="section">
  <div class="section-header">
    <div class="section-title"><span class="dot"></span>功能模块</div>
  </div>
  <div class="module-grid" id="module-grid"></div>
</div>

<!-- 今日工作清单 -->
<div class="section">
  <div class="section-header">
    <div class="section-title"><span class="dot"></span>今日工作清单</div>
  </div>
  <div id="checklist-container"></div>
</div>

<!-- 待办任务 -->
<div class="section">
  <div class="section-header">
    <div class="section-title"><span class="dot"></span>待办任务</div>
    <a href="/collaboration.html" class="section-more">全部 →</a>
  </div>
  <div id="task-container"></div>
</div>

<!-- 实时预警 -->
<div class="section">
  <div class="section-header">
    <div class="section-title"><span class="dot" style="background:var(--red)"></span>实时预警</div>
    <a href="/iot.html" class="section-more">详情 →</a>
  </div>
  <div id="alert-container"></div>
</div>

<!-- 数据驾驶舱入口 -->
<div class="section" style="padding:16px">
  <div style="display:flex;align-items:center;gap:12px">
    <div style="font-size:28px">📊</div>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:600;color:var(--g)">数据驾驶舱</div>
      <div style="font-size:11px;color:var(--muted)">全局态势感知 · 实时数据大屏</div>
    </div>
    <a href="/dashboard.html" style="padding:6px 14px;background:var(--gm);color:#fff;border-radius:8px;font-size:12px;text-decoration:none">进入</a>
  </div>
</div>

<div class="footer">© 2026 环保智慧执法平台 · EPB-Agent</div>
<div id="toast"></div>

<script>
var roleConfig={
  gov_enforcement:{icon:'🚔',name:'执法大队',modules:[
    {icon:'🚔',name:'执法终端',url:'/field-terminal.html'},
    {icon:'🧠',name:'AI分析',url:'/analysis.html'},
    {icon:'📚',name:'知识库',url:'/knowledge.html'},
    {icon:'📡',name:'物联感知',url:'/iot.html'},
    {icon:'📊',name:'驾驶舱',url:'/dashboard.html'},
    {icon:'🔄',name:'协同',url:'/collaboration.html'},
    {icon:'🎬',name:'视频',url:'/video-studio.html'},
    {icon:'📋',name:'工作台',url:'/workspace.html'}
  ],checklist:[
    '查看今日执法任务和待办事项',
    '检查在线监测预警，关注超标企业',
    '执行现场检查任务，使用执法终端采集证据',
    '提交执法卷宗和检查报告',
    '跟踪案件办理进度，及时处理审批'
  ]},
  gov_admin:{icon:'🏛',name:'行政管理',modules:[
    {icon:'⚖️',name:'行政管理',url:'/admin.html'},
    {icon:'📚',name:'知识库',url:'/knowledge.html'},
    {icon:'🔄',name:'协同',url:'/collaboration.html'},
    {icon:'🚨',name:'举报',url:'/report.html'},
    {icon:'📊',name:'驾驶舱',url:'/dashboard.html'},
    {icon:'🎬',name:'视频',url:'/video-studio.html'},
    {icon:'🎓',name:'培训',url:'/training.html'},
    {icon:'📋',name:'工作台',url:'/workspace.html'}
  ],checklist:[
    '处理待审批事项（许可证、处罚决定等）',
    '查看举报工单，分派至执法科室',
    '管理企业档案和排污许可信息',
    '发布环保宣传内容和通知公告',
    '统计汇总本周/月执法数据'
  ]},
  enterprise:{icon:'🏢',name:'企业管理',modules:[
    {icon:'🏢',name:'EHS管理',url:'/ehs.html'},
    {icon:'🔍',name:'企业自查',url:'/m-self-check.html'},
    {icon:'📚',name:'知识库',url:'/knowledge.html'},
    {icon:'🔄',name:'协同',url:'/collaboration.html'},
    {icon:'🎓',name:'培训',url:'/training.html'},
    {icon:'📊',name:'驾驶舱',url:'/dashboard.html'},
    {icon:'🚨',name:'举报',url:'/m-report.html'},
    {icon:'📚',name:'案例',url:'/m-cases.html'}
  ],checklist:[
    '完成本月环保合规自查',
    '查看并处理政府下达的整改任务',
    '检查排污许可证有效期和执行报告',
    '确认污染防治设施正常运行',
    '按时提交监测数据和执行报告'
  ]},
  third_party:{icon:'🔍',name:'第三方督查',modules:[
    {icon:'🔍',name:'督查',url:'/supervision.html'},
    {icon:'📚',name:'知识库',url:'/knowledge.html'},
    {icon:'🔄',name:'协同',url:'/collaboration.html'},
    {icon:'🧠',name:'AI分析',url:'/analysis.html'},
    {icon:'📡',name:'物联感知',url:'/iot.html'},
    {icon:'📊',name:'驾驶舱',url:'/dashboard.html'},
    {icon:'🎓',name:'培训',url:'/training.html'},
    {icon:'📋',name:'工作台',url:'/workspace.html'}
  ],checklist:[
    '领取督查任务，查看督查清单',
    '按督查清单逐项检查并拍照取证',
    '核实企业在线监测数据真实性',
    '生成督查报告并关联法条建议',
    '提交督查结果至委托方'
  ]},
  design_institute:{icon:'📐',name:'设计院',modules:[
    {icon:'📚',name:'知识库',url:'/knowledge.html'},
    {icon:'🧠',name:'AI分析',url:'/analysis.html'},
    {icon:'📡',name:'在线监测',url:'/iot.html'},
    {icon:'🔄',name:'协同',url:'/collaboration.html'},
    {icon:'📊',name:'驾驶舱',url:'/dashboard.html'},
    {icon:'🎓',name:'培训',url:'/training.html'},
    {icon:'🚨',name:'举报',url:'/m-report.html'},
    {icon:'📚',name:'案例',url:'/m-cases.html'}
  ],checklist:[
    '采集项目区域环境基础数据',
    '查阅适用环保法规和排放标准',
    '分析在线监测历史数据趋势',
    '编制环境影响评价文件',
    '提交技术方案至委托方审核'
  ]},
  public:{icon:'👥',name:'公众/学习',modules:[
    {icon:'🚨',name:'举报',url:'/m-report.html'},
    {icon:'📚',name:'案例',url:'/m-cases.html'},
    {icon:'📚',name:'知识库',url:'/knowledge.html'},
    {icon:'🎓',name:'培训',url:'/training.html'},
    {icon:'🏢',name:'自查',url:'/m-self-check.html'},
    {icon:'📊',name:'驾驶舱',url:'/dashboard.html'},
    {icon:'📋',name:'工作台',url:'/workspace.html'},
    {icon:'🔄',name:'协同',url:'/collaboration.html'}
  ],checklist:[
    '学习环保法律法规基础知识',
    '通过场景化实训提升业务能力',
    '查看典型执法案例',
    '参与环保知识问答',
    '如发现环境问题，通过举报功能反映'
  ]}
};

var user=null;
try{user=JSON.parse(localStorage.getItem('epb_user')||'{}');}catch(e){}

var role=user.role||'public';
var cfg=roleConfig[role]||roleConfig.public;

// Render user info
document.getElementById('role-badge').textContent=cfg.icon+' '+cfg.name;
document.getElementById('user-avatar').textContent=cfg.icon;
document.getElementById('user-name').textContent=user.name||'游客';
document.getElementById('user-org').textContent=user.org||'请登录获取个性化服务';

// Render modules
document.getElementById('module-grid').innerHTML=cfg.modules.map(function(m){
  return '<a href="'+m.url+'" class="module-item"><div class="module-icon">'+m.icon+'</div><div class="module-name">'+m.name+'</div></a>';
}).join('');

// Render checklist
document.getElementById('checklist-container').innerHTML=cfg.checklist.map(function(item,idx){
  return '<div class="checklist-item"><div class="checklist-num">'+(idx+1)+'</div><div>'+item+'</div></div>';
}).join('');

// Load tasks
fetch('/api/tasks').then(r=>r.json()).then(data=>{
  var tasks=data.data||data.tasks||[];
  var pending=tasks.filter(function(t){return t.status!=='completed';}).length;
  var done=tasks.filter(function(t){return t.status==='completed';}).length;
  document.getElementById('stat-todo').textContent=pending;
  document.getElementById('stat-done').textContent=done;
  if(tasks.length===0){
    document.getElementById('task-container').innerHTML='<div class="empty">暂无任务</div>';
    return;
  }
  var stMap={pending:'待处理',assigned:'待接收',processing:'处理中',verifying:'待核查',completed:'已完成'};
  document.getElementById('task-container').innerHTML=tasks.slice(0,4).map(function(t){
    var prCls=t.priority==='high'?'p-high':t.priority==='low'?'p-low':'p-mid';
    return '<div class="task-item" onclick="location.href=\'/collaboration.html\'"><div class="task-priority '+prCls+'"></div><div class="task-info"><div class="task-title">'+(t.title||'')+'</div><div class="task-meta">'+(t.type||'')+' | '+(stMap[t.status]||t.status)+'</div></div><div class="task-arrow">›</div></div>';
  }).join('');
}).catch(function(){
  document.getElementById('task-container').innerHTML='<div class="empty">任务加载失败</div>';
});

// Load alerts
fetch('/api/fusion_alert',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})})
.then(r=>r.json()).then(data=>{
  var alerts=data.alerts||[];
  document.getElementById('stat-alert').textContent=alerts.filter(function(a){return (a.level||'').indexOf('高')>=0;}).length;
  if(alerts.length===0){
    document.getElementById('alert-container').innerHTML='<div class="empty">暂无预警</div>';
    return;
  }
  document.getElementById('alert-container').innerHTML=alerts.slice(0,4).map(function(a){
    var level=a.level||'中';
    var dotCls=level.indexOf('高')>=0?'alert-red':level.indexOf('中')>=0?'alert-amber':'alert-green';
    return '<div class="alert-item"><div class="alert-dot '+dotCls+'"></div><div style="flex:1"><div>'+(a.desc||a.title||'').slice(0,40)+'</div><div style="font-size:10px;color:var(--muted);margin-top:2px">'+(a.type||'')+' | '+(a.time||'')+'</div></div></div>';
  }).join('');
}).catch(function(){
  document.getElementById('alert-container').innerHTML='<div class="empty">预警加载失败</div>';
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>自由裁量计算器 · 环保执法</title>
<style>
:root{--bg:#0a0e1a;--card:#111827;--card2:#1a2332;--border:#1e293b;--primary:#3b82f6;--primary2:#60a5fa;--accent:#10b981;--warn:#f59e0b;--danger:#ef4444;--text:#e2e8f0;--muted:#64748b;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;padding-bottom:80px}
.hero{background:linear-gradient(135deg,#0c4a6e 0%,#1e293b 100%);padding:24px 20px;text-align:center}
.hero h1{font-size:20px;font-weight:700;margin-bottom:4px}
.hero h1 span{color:var(--accent)}
.hero p{color:var(--muted);font-size:12px}
.container{padding:16px}
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.section-title{font-size:14px;font-weight:600;color:var(--primary2);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';width:3px;height:14px;background:var(--primary);border-radius:2px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:block}
.form-select,.form-input{width:100%;padding:10px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none}
.form-select:focus,.form-input:focus{border-color:var(--primary)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:active{transform:scale(.98)}
.result-card{background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(59,130,246,.08));border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;text-align:center;margin-top:16px}
.result-amount{font-size:32px;font-weight:700;color:var(--accent)}
.result-range{font-size:14px;color:var(--text);margin-top:4px}
.result-label{font-size:11px;color:var(--muted);margin-top:8px}
.factor-list{margin-top:12px}
.factor-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--card2);border-radius:6px;margin-bottom:6px;font-size:12px}
.factor-item .name{color:var(--muted)}
.factor-item .value{font-weight:600}
.factor-item.up .value{color:var(--danger)}
.factor-item.down .value{color:var(--accent)}
.law-box{background:var(--card2);border-radius:8px;padding:12px;margin-top:8px;border-left:3px solid var(--warn)}
.law-box .law-name{font-size:12px;font-weight:600;color:var(--warn);margin-bottom:4px}
.law-box .law-text{font-size:11px;color:var(--muted);line-height:1.6}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;padding:8px 0;z-index:100}
.nav-item{flex:1;text-align:center;padding:6px 0;color:var(--muted);text-decoration:none;font-size:10px}
.nav-item.active{color:var(--primary)}
.nav-item .icon{font-size:18px;display:block;margin-bottom:2px}
/* 响应式适配 */
@media (max-width:768px){
  *{font-size:90%}
  .container{padding:8px;max-width:100%}
  .stat-row,.module-grid,.channel-grid,.scenario-grid,.report-grid,.quick-grid,.stats-grid,.dim-grid,.sensor-grid,.form-row,.result-grid,.industry-grid,.cal-header,.cal-grid{grid-template-columns:1fr!important;gap:6px}
  .section,.card{padding:10px;margin-bottom:8px}
  .bottom-nav{padding:6px 0}
  .nav-item{font-size:9px}
  .nav-item .icon{font-size:16px}
  .search-bar{position:relative;padding:8px}
  .tab,.filter-chip{font-size:11px;padding:6px 10px}
  table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
  .hero{padding:12px}
  .form-row{grid-template-columns:1fr!important}
  .ent-card,.task-item,.alert-item{flex-direction:column;align-items:flex-start;gap:6px}
  .module-item{padding:10px 6px}
  .api-example,.api-path{font-size:9px}
}
@media (min-width:1200px){
  .container{max-width:1400px;margin:0 auto}
  .stat-row{grid-template-columns:repeat(4,1fr)!important}
  .module-grid{grid-template-columns:repeat(3,1fr)!important}
  .channel-grid,.scenario-grid,.stats-grid,.dim-grid,.sensor-grid,.result-grid,.industry-grid{grid-template-columns:repeat(3,1fr)!important}
  .section,.card{padding:20px}
  .bottom-nav{max-width:1400px;left:50%;transform:translateX(-50%);width:100%;max-width:1400px}
  .search-bar{max-width:1400px;left:50%;transform:translateX(-50%);width:100%}
}
</style>
<script src="api-fallback.js"></script>
</head>
<body>
<div class="hero">
<h1>自由裁量 <span>计算器</span></h1>
<p>输入违法情节 · 自动计算处罚区间 · 法条精准匹配</p>
</div>

<div class="container">
<div class="section">
<div class="section-title">违法事实认定</div>
<div class="form-group">
<label class="form-label">违法行为类型</label>
<select class="form-select" id="violation-type" onchange="updateLaw()">
<option value="">请选择...</option>
<option value="water_discharge">水污染物超标排放</option>
<option value="air_discharge">大气污染物超标排放</option>
<option value="solid_waste">固废/危废违法</option>
<option value="monitoring_tamper">自动监测数据篡改</option>
<option value="no_permit">无排污许可证排放</option>
<option value="env_incident">突发环境事件</option>
<option value="noise">噪声超标排放</option>
<option value="soil">土壤污染违法</option>
</select>
</div>
<div class="form-group">
<label class="form-label">违法主体</label>
<select class="form-select" id="subject-type">
<option value="enterprise">企业法人</option>
<option value="individual">个体工商户</option>
<option value="person">自然人</option>
</select>
</div>
<div class="form-group">
<label class="form-label">违法行为持续时长</label>
<select class="form-select" id="duration">
<option value="short">3个月以下</option>
<option value="medium">3-6个月</option>
<option value="long">6个月以上</option>
</select>
</div>
</div>

<div class="section">
<div class="section-title">裁量因子</div>
<div class="form-group">
<label class="form-label">超标倍数 / 违法程度</label>
<select class="form-select" id="severity">
<option value="minor">轻微（超标<1倍）</option>
<option value="general">一般（超标1-3倍）</option>
<option value="serious">严重（超标3-10倍）</option>
<option value="very_serious">特别严重（超标>10倍）</option>
</select>
</div>
<div class="form-row">
<div class="form-group">
<label class="form-label">是否造成实际损害</label>
<select class="form-select" id="damage">
<option value="none">无损害</option>
<option value="minor">轻微损害</option>
<option value="moderate">较大损害</option>
<option value="severe">严重损害</option>
</select>
</div>
<div class="form-group">
<label class="form-label">是否造成社会影响</label>
<select class="form-select" id="social_impact">
<option value="none">无社会影响</option>
<option value="minor">投诉/舆情</option>
<option value="moderate">群体事件</option>
<option value="severe">重大舆情</option>
</select>
</div>
</div>
<div class="form-group">
<label class="form-label">主观过错程度</label>
<select class="form-select" id="intent">
<option value="negligent">过失</option>
<option value="indirect">间接故意</option>
<option value="direct">直接故意</option>
</select>
</div>
</div>

<div class="section">
<div class="section-title">从轻/从重情节</div>
<div class="form-group">
<label class="form-label">整改情况</label>
<select class="form-select" id="rectification">
<option value="proactive">主动整改完成</option>
<option value="ordered">责令后整改</option>
<option value="partial">部分整改</option>
<option value="none">未整改</option>
</select>
</div>
<div class="form-row">
<div class="form-group">
<label class="form-label">是否初犯</label>
<select class="form-select" id="first_offense">
<option value="yes">初次违法</option>
<option value="no">两年内再犯</option>
<option value="repeat">多次违法</option>
</select>
</div>
<div class="form-group">
<label class="form-label">配合调查情况</label>
<select class="form-select" id="cooperation">
<option value="active">主动配合</option>
<option value="normal">正常配合</option>
<option value="resist">消极抵抗</option>
<option value="obstruct">阻挠调查</option>
</select>
</div>
</div>
</div>

<button class="btn btn-primary" style="margin:0 16px;width:calc(100% - 32px)" onclick="calculate()">计算处罚建议</button>

<div id="result-area"></div>
<div id="law-area"></div>
</div>

<div class="bottom-nav">
<a class="nav-item" href="index.html"><span class="icon">🏠</span>首页</a>
<a class="nav-item" href="knowledge.html"><span class="icon">📚</span>知识库</a>

<a class="nav-item" href="equipment-mall.html"><span class="icon">🛒</span>商城</a>
<a class="nav-item" href="m-workspace.html"><span class="icon">📋</span>工作台</a>
</div>

<script>
var API_BASE='';
var _apiFallbackMap={'/api/penalty_calculate':'/api-data/penalty_calculate.json'};
var _origFetch=window.fetch;
window.fetch=function(url,opts){return _origFetch(url,opts).catch(function(){var fb=_apiFallbackMap[url]||_apiFallbackMap[url.split('?')[0]];if(fb)return _origFetch(fb);throw new Error('API unavailable: '+url);})};

var LAW_MAP={
water_discharge:{name:'《水污染防治法》第八十三条',text:'企业事业单位和其他生产经营者排放水污染物超过国家或者地方规定的水污染物排放标准或者重点水污染物排放总量控制指标的，由县级以上人民政府环境保护主管部门责令改正或者责令限制生产、停产整治，并处十万元以上一百万元以下的罚款；情节严重的，报经有批准权的人民政府批准，责令停业、关闭。',base_min:10,base_max:100},
air_discharge:{name:'《大气污染防治法》第九十九条',text:'企业事业单位和其他生产经营者超过大气污染物排放标准或者重点大气污染物排放总量控制指标排放大气污染物的，由县级以上人民政府生态环境主管部门责令改正或者限制生产、停产整治，并处十万元以上一百万元以下的罚款；情节严重的，报经有批准权的人民政府批准，责令停业、关闭。',base_min:10,base_max:100},
solid_waste:{name:'《固体废物污染环境防治法》第一百零二条',text:'违反本法规定，擅自倾倒、堆放、丢弃、遗撒工业固体废物，或者未采取相应防范措施，造成工业固体废物扬散、流失、渗漏或者其他环境污染的，处所需处置费用一倍以上三倍以下的罚款，所需处置费用不足十万元的，按十万元计算。',base_min:10,base_max:300},
monitoring_tamper:{name:'《环境保护法》第六十三条',text:'通过暗管、渗井、渗坑、灌注或者篡改、伪造监测数据，或者不正常运行防治污染设施等逃避监管的方式违法排放污染物的，尚不构成犯罪的，县级以上人民政府环境保护主管部门或者其他有关部门将案件移送公安机关，对其直接负责的主管人员和其他直接责任人员，处十日以上十五日以下拘留；情节较轻的，处五日以上十日以下拘留。',base_min:10,base_max:100},
no_permit:{name:'《排污许可管理条例》第三十三条',text:'未取得排污许可证排放污染物等违法行为，由生态环境主管部门责令改正或者限制生产、停产整治，处二十万元以上一百万元以下的罚款；情节严重的，报经有批准权的人民政府批准，责令停业、关闭。',base_min:20,base_max:100},
env_incident:{name:'《突发事件应对法》第六十六条',text:'单位或者个人违反本法规定，导致发生突发事件或者突发事件危害扩大的，由所在地履行统一领导职责的人民政府责令停产停业，暂扣或者吊销许可证或者营业执照，并处五万元以上二十万元以下的罚款。',base_min:5,base_max:20},
noise:{name:'《噪声污染防治法》第七十五条',text:'超过噪声排放标准排放工业噪声的，由生态环境主管部门责令改正，处二万元以上二十万元以下的罚款；拒不改正的，责令限制生产、停产整治。',base_min:2,base_max:20},
soil:{name:'《土壤污染防治法》第八十七条',text:'土壤污染责任人或者土地使用权人未按照规定进行土壤污染状况调查的，由地方人民政府生态环境主管部门责令改正，处二万元以上二十万元以下的罚款；拒不改正的，处二十万元以上一百万元以下的罚款。',base_min:2,base_max:100}
};

function updateLaw(){
var v=document.getElementById('violation-type').value;
var law=LAW_MAP[v];
var lawArea=document.getElementById('law-area');
if(!law){lawArea.innerHTML='';return}
lawArea.innerHTML='<div class="section"><div class="section-title">适用法条</div><div class="law-box"><div class="law-name">'+law.name+'</div><div class="law-text">'+law.text+'</div><div style="margin-top:8px;font-size:12px;color:var(--accent)">基准罚款区间：'+law.base_min+'万 - '+law.base_max+'万元</div></div></div>';
}

function calculate(){
var vType=document.getElementById('violation-type').value;
if(!vType){epbToast('请先选择违法行为类型');return}
var law=LAW_MAP[vType];
var baseMin=law.base_min;
var baseMax=law.base_max;

var factors=[];
var multiplier=1.0;

// 违法程度
var sev=document.getElementById('severity').value;
var sevMap={minor:0.7,general:1.0,serious:1.3,very_serious:1.6};
multiplier*=sevMap[sev];
factors.push({name:'违法程度',value:sevMap[sev]==0.7?'从轻(-30%)':sevMap[sev]==1.6?'从重(+60%)':'基准',dir:sevMap[sev]<1?'down':'up'});

// 持续时长
var dur=document.getElementById('duration').value;
var durMap={short:0.9,medium:1.1,long:1.3};
multiplier*=durMap[dur];
factors.push({name:'持续时长',value:durMap[dur]<1?'从轻':durMap[dur]>1.2?'从重':'基准',dir:durMap[dur]<1?'down':'up'});

// 损害后果
var dmg=document.getElementById('damage').value;
var dmgMap={none:0.9,minor:1.0,moderate:1.2,severe:1.5};
multiplier*=dmgMap[dmg];
factors.push({name:'损害后果',value:dmgMap[dmg]<1?'从轻':dmgMap[dmg]>1.1?'从重':'基准',dir:dmgMap[dmg]<1?'down':'up'});

// 社会影响
var soc=document.getElementById('social_impact').value;
var socMap={none:1.0,minor:1.1,moderate:1.2,severe:1.4};
multiplier*=socMap[soc];
factors.push({name:'社会影响',value:socMap[soc]>1?'从重':'基准',dir:socMap[soc]>1?'up':'down'});

// 主观过错
var int=document.getElementById('intent').value;
var intMap={negligent:0.9,indirect:1.1,direct:1.3};
multiplier*=intMap[int];
factors.push({name:'主观过错',value:intMap[int]<1?'从轻':intMap[int]>1.2?'从重':'基准',dir:intMap[int]<1?'down':'up'});

// 整改情况
var rec=document.getElementById('rectification').value;
var recMap={proactive:0.8,ordered:1.0,partial:1.1,none:1.3};
multiplier*=recMap[rec];
factors.push({name:'整改情况',value:recMap[rec]<1?'从轻':recMap[rec]>1.2?'从重':'基准',dir:recMap[rec]<1?'down':'up'});

// 初犯
var first=document.getElementById('first_offense').value;
var firstMap={yes:0.85,no:1.0,repeat:1.2};
multiplier*=firstMap[first];
factors.push({name:'违法次数',value:firstMap[first]<1?'从轻':firstMap[first]>1.1?'从重':'基准',dir:firstMap[first]<1?'down':'up'});

// 配合调查
var coop=document.getElementById('cooperation').value;
var coopMap={active:0.9,normal:1.0,resist:1.1,obstruct:1.3};
multiplier*=coopMap[coop];
factors.push({name:'配合调查',value:coopMap[coop]<1?'从轻':coopMap[coop]>1.2?'从重':'基准',dir:coopMap[coop]<1?'down':'up'});

// 主体类型
var sub=document.getElementById('subject-type').value;
var subMap={enterprise:1.0,individual:0.6,person:0.3};
multiplier*=subMap[sub];

// 计算最终区间
var finalMin=Math.round(baseMin*multiplier*10)/10;
var finalMax=Math.round(baseMax*multiplier*10)/10;
var midAmount=Math.round((finalMin+finalMax)/2*10)/10;

// 限制下限不低于1万
finalMin=Math.max(1,finalMin);
finalMax=Math.max(finalMin,finalMax);

// 涉刑判断
var criminal=false;
var criminalText='';
if(vType==='monitoring_tamper'||(sev==='very_serious'&&dmg==='severe')){
criminal=true;
criminalText='该违法行为可能涉嫌污染环境罪，建议移送公安机关';
}

var html='<div class="section"><div class="section-title">处罚建议</div>';
html+='<div class="result-card">';
html+='<div class="result-amount">'+finalMin+'万 - '+finalMax+'万元</div>';
html+='<div class="result-range">建议处罚金额区间（中位数：'+midAmount+'万元）</div>';
html+='<div class="result-label">综合裁量系数：'+multiplier.toFixed(2)+' · 基准区间：'+baseMin+'-'+baseMax+'万</div>';
html+='</div>';

html+='<div class="factor-list">';
factors.forEach(function(f){
html+='<div class="factor-item '+f.dir+'"><span class="name">'+f.name+'</span><span class="value">'+f.value+'</span></div>';
});
html+='</div>';

if(criminal){
html+='<div style="margin-top:12px;padding:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px"><div style="font-size:13px;font-weight:600;color:#fca5a5">⚠️ 涉刑移送预警</div><div style="font-size:12px;color:var(--muted);margin-top:4px">'+criminalText+'</div></div>';
}

html+='<div style="margin-top:12px;padding:10px;background:var(--card2);border-radius:6px;font-size:11px;color:var(--muted)">以上计算结果仅供参考，实际处罚需结合案件具体情况、地方裁量基准和执法人员综合判断。依据：《行政处罚法》第三十二条、第三十三条及生态环境行政处罚裁量权规定。</div>';

html+='</div>';

document.getElementById('result-area').innerHTML=html;
}

function epbToast(msg){var t=document.createElement('div');t.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a2332;color:#e2e8f0;padding:10px 20px;border-radius:8px;border:1px solid #1e293b;z-index:9999;font-size:13px';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},3000)}
</script>
<script src="global-sidebar.js"></script>
<script src="voice-assistant.js"></script>
<script src="ai-assistant.js"></script>
</body>
</html>
